<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تصفّح المتاحف · Browse</title>
<link rel="stylesheet" href="/static/app.css?v=2">
<style>
/* Browse-specific styles */
.browse-header {
  display:flex; flex-wrap:wrap; gap:12px; align-items:center;
  padding: 14px 28px;
  border-bottom:1px solid var(--line);
  background: rgba(8, 7, 10, 0.6);
  backdrop-filter: blur(8px);
}
.browse-header input, .browse-header select, .browse-header button {
  background:var(--panel); color:var(--text); border:1px solid var(--line);
  padding:8px 12px; border-radius:6px; font:inherit;
}
.browse-header input:focus, .browse-header select:focus { outline:none; border-color:var(--gold); }
.browse-header input { width: 320px; }
.browse-header button { cursor: pointer; transition: all .15s; }
.browse-header button:hover { color: var(--gold); border-color: var(--gold); }
.browse-header button.active { background: var(--gold); color: #1a1410; border-color: var(--gold); font-weight: 600; }
.browse-header .stats { color: var(--dim); font-size: 12px; margin-right: auto; }

.timeline-bar {
  display:flex; align-items:center; gap:6px;
  padding:10px 28px;
  background:#13110d;
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.timeline-bar small { color:var(--dim); font-size:11px; }
.pill {
  padding:5px 10px; border:1px solid var(--line); border-radius:14px; cursor:pointer;
  font-size:12px; color:var(--dim); background:transparent; transition:all .15s;
}
.pill:hover { color:var(--gold); border-color:var(--gold); }
.pill.active { background:var(--gold); color:#1a1410; border-color:var(--gold); }

#grid {
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:14px; padding:24px 28px;
  max-width: 1400px; margin: 0 auto;
}
.card {
  background:var(--panel); border:1px solid var(--line); border-radius:10px;
  overflow:hidden; cursor:pointer; display:flex; flex-direction:column;
  transition:transform .15s, box-shadow .15s, border-color .15s;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow:0 12px 28px rgba(212,182,106,.2);
  border-color:var(--gold);
}
.card .thumb {
  aspect-ratio: 4/5; background:#000 center/cover no-repeat;
  position:relative;
}
.card .badge-hl {
  position:absolute; top:8px; right:8px; background:var(--gold); color:#1a1410;
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:9px;
  letter-spacing:.4px;
}
.card .body { padding:10px 12px; flex:1; display:flex; flex-direction:column; }
.card .name { font-size:14px; line-height:1.35; margin-bottom:2px; }
.card .name-en { color:var(--dim); font-size:11px; }
.card .meta { color:var(--dim); font-size:11px; margin-top:auto; padding-top:6px; }
.card .museum { color:var(--gold); font-size:11px; margin-top:4px; }
#empty { text-align:center; color:var(--dim); padding:80px 20px; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">
    <span class="logo">𓋹</span>
    <span class="brand-text">المتاحف المصرية</span>
  </div>
  <div class="nav-links">
    <a href="/">اسأل · Ask</a>
    <a href="/browse" class="active">تصفّح · Browse</a>
    <a href="/api/docs" target="_blank">API</a>
  </div>
</nav>

<div class="browse-header">
  <input id="q" placeholder="ابحث... (Tutankhamun, Narmer, Hatshepsut, ...)">
  <select id="museum"><option value="">كل المتاحف</option></select>
  <button id="hl-toggle">★ Highlights only</button>
  <span class="stats" id="count"></span>
</div>

<div class="timeline-bar">
  <small>الفترة الزمنية:</small>
  <button class="pill" data-min="-5500" data-max="-3100">عصر ما قبل الأسرات</button>
  <button class="pill" data-min="-3100" data-max="-2686">العصر العتيق</button>
  <button class="pill" data-min="-2686" data-max="-2181">الدولة القديمة</button>
  <button class="pill" data-min="-2181" data-max="-2055">انتقال أول</button>
  <button class="pill" data-min="-2055" data-max="-1650">الدولة الوسطى</button>
  <button class="pill" data-min="-1650" data-max="-1550">انتقال ثاني</button>
  <button class="pill" data-min="-1550" data-max="-1069">الدولة الحديثة</button>
  <button class="pill" data-min="-1069" data-max="-664">انتقال ثالث</button>
  <button class="pill" data-min="-664" data-max="-332">العصر المتأخر</button>
  <button class="pill" data-min="-332" data-max="-30">العصر البطلمي</button>
  <button class="pill" data-min="-30" data-max="641">روماني/قبطي</button>
  <button class="pill" id="period-clear">إعادة تعيين</button>
</div>

<div id="grid"></div>
<div id="empty">جاري تحميل البيانات…</div>

<div class="detail-modal" id="detailModal" hidden>
  <div class="detail-wrap">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div id="detailBody"></div>
  </div>
</div>

<div id="image-modal" onclick="this.classList.remove('show')">
  <img id="modal-img">
</div>

<script>
const grid = document.getElementById('grid');
const qIn  = document.getElementById('q');
const mSel = document.getElementById('museum');
const hlBtn = document.getElementById('hl-toggle');
const cnt  = document.getElementById('count');
const empt = document.getElementById('empty');
const periodPills = document.querySelectorAll('.pill[data-min]');
const periodClear = document.getElementById('period-clear');
const detailModal = document.getElementById('detailModal');
const detailBody  = document.getElementById('detailBody');
const imageModal  = document.getElementById('image-modal');
const modalImg    = document.getElementById('modal-img');

let RECORDS = [];
let MUSEUMS = {};
let highlightOnly = false;
let periodFilter = null;

function escapeHtml(s) {
  return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function museumLabel(id) {
  return (MUSEUMS[id]?.names.ar || MUSEUMS[id]?.names.en || id || '');
}

function bcDateStr(yMin, yMax) {
  if (yMin == null) return '';
  const fmt = y => y < 0 ? `${-y} ق.م` : `${y} م`;
  if (yMin === yMax) return fmt(yMin);
  return `${fmt(yMin)} – ${fmt(yMax)}`;
}

function render() {
  const q = qIn.value.trim().toLowerCase();
  const mus = mSel.value;
  const filt = RECORDS.filter(r => {
    if (highlightOnly && !r.highlight) return false;
    if (mus && r.museum_id !== mus) return false;
    if (periodFilter) {
      if (r.year_min == null) return false;
      if (r.year_max < periodFilter.min || r.year_min > periodFilter.max) return false;
    }
    if (q) {
      const blob = (r.name_ar + ' ' + r.name_en + ' ' + (r.tags || []).join(' ') + ' ' + (r.museum_ar || '')).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  cnt.textContent = `${filt.length} / ${RECORDS.length} قطعة`;
  empt.style.display = filt.length ? 'none' : 'block';
  empt.textContent = filt.length ? '' : 'لا توجد نتائج لهذه التصفية.';
  grid.innerHTML = filt.slice(0, 600).map(r => `
    <div class="card" data-id="${escapeHtml(r.id)}">
      <div class="thumb" style="background-image:url('/images/${escapeHtml(r.primary_image || '')}')">
        ${r.highlight ? '<span class="badge-hl">★ مميزة</span>' : ''}
      </div>
      <div class="body">
        <div class="name">${escapeHtml(r.name_ar || r.name_en || r.id)}</div>
        ${r.name_en ? `<div class="name-en">${escapeHtml(r.name_en)}</div>` : ''}
        <div class="meta">${escapeHtml(bcDateStr(r.year_min, r.year_max))}</div>
        ${r.museum_id ? `<div class="museum">${escapeHtml(museumLabel(r.museum_id))}</div>` : ''}
      </div>
    </div>`).join('');
  grid.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => openDetail(c.dataset.id)));
}

async function openDetail(id) {
  let rec;
  try {
    const r = await fetch(`/api/artifacts/${encodeURIComponent(id)}`);
    if (!r.ok) throw 0; rec = await r.json();
  } catch { alert('No detail for ' + id); return; }
  const imgs = (rec.images || []).map(i =>
    `<img src="/images/${escapeHtml(i.filename)}" alt="${escapeHtml(i.caption_en || '')}"
          title="${escapeHtml(i.credit || '')} — ${escapeHtml(i.license || '')}"
          onclick="zoomImage(this.src)">`).join('');
  const qa = (rec.qa_pairs_ar || []).map(p =>
    `<div class="qa"><b>س:</b> ${escapeHtml(p.q)}<br><b>ج:</b> ${escapeHtml(p.a)}</div>`).join('');
  const related = (rec.related_ids || []).map(rid => {
    const orig = RECORDS.find(r => r.id === rid);
    return `<span class="chip" data-id="${escapeHtml(rid)}">${escapeHtml(orig?.name_ar || rid)}</span>`;
  }).join('');
  detailBody.innerHTML = `
    <h2>${escapeHtml(rec.names?.ar || rec.names?.en || rec.id)}</h2>
    <div class="name-en">${escapeHtml(rec.names?.en || '')}</div>
    ${imgs ? `<div class="gallery">${imgs}</div>` : ''}
    ${rec.current_location?.museum_ar || rec.current_location?.museum_en
      ? `<div class="field"><b>المتحف:</b> ${escapeHtml(rec.current_location.museum_ar || rec.current_location.museum_en)}</div>` : ''}
    ${rec.current_location?.hall_ar
      ? `<div class="field"><b>القاعة:</b> ${escapeHtml(rec.current_location.hall_ar)}</div>` : ''}
    ${rec.period?.ar || rec.period?.en
      ? `<div class="field"><b>العصر:</b> ${escapeHtml(rec.period.ar || rec.period.en)}</div>` : ''}
    ${rec.dynasty?.ar || rec.dynasty?.en
      ? `<div class="field"><b>الأسرة:</b> ${escapeHtml(rec.dynasty.ar || rec.dynasty.en)}</div>` : ''}
    ${rec.material?.length ? `<div class="field"><b>المادة:</b> ${escapeHtml(rec.material.join('، '))}</div>` : ''}
    ${rec.sources?.length ? `<div class="field"><b>المصدر:</b> ${rec.sources.map(s => `<a href="${escapeHtml(s.url)}" target="_blank" style="color:var(--gold)">${escapeHtml(s.type)}</a>`).join(' · ')}</div>` : ''}
    <div class="desc">${escapeHtml(rec.description?.ar || rec.description?.en || '')}</div>
    ${qa ? '<h3>أسئلة عن هذه القطعة</h3>' + qa : ''}
    ${related ? '<h3>قطع ذات صلة</h3><div class="related-chips">' + related + '</div>' : ''}
  `;
  detailModal.hidden = false;
  detailModal.querySelectorAll('.related-chips .chip').forEach(c =>
    c.addEventListener('click', () => openDetail(c.dataset.id)));
  detailModal.scrollTop = 0;
}
function closeDetail() { detailModal.hidden = true; }
function zoomImage(src) { modalImg.src = src; imageModal.classList.add('show'); }
window.openDetail = openDetail;
window.closeDetail = closeDetail;
window.zoomImage = zoomImage;

(async () => {
  RECORDS = await fetch('/api/artifacts').then(r => r.json());
  RECORDS.sort((a, b) => {
    if (a.highlight !== b.highlight) return b.highlight - a.highlight;
    return (a.year_min || 9999) - (b.year_min || 9999);
  });
  const ms = await fetch('/api/museums').then(r => r.json());
  ms.forEach(m => MUSEUMS[m.id] = m);
  mSel.innerHTML = '<option value="">كل المتاحف</option>'
    + ms.map(m => `<option value="${m.id}">${escapeHtml(m.names.ar || m.names.en)}</option>`).join('');
  qIn.addEventListener('input', render);
  mSel.addEventListener('change', render);
  hlBtn.addEventListener('click', () => {
    highlightOnly = !highlightOnly;
    hlBtn.classList.toggle('active', highlightOnly);
    render();
  });
  periodPills.forEach(b => b.addEventListener('click', () => {
    periodPills.forEach(o => o.classList.remove('active'));
    b.classList.add('active');
    periodFilter = { min: parseInt(b.dataset.min), max: parseInt(b.dataset.max) };
    render();
  }));
  periodClear.addEventListener('click', () => {
    periodPills.forEach(o => o.classList.remove('active'));
    periodFilter = null; render();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (imageModal.classList.contains('show')) imageModal.classList.remove('show');
      else if (!detailModal.hidden) closeDetail();
    }
  });
  render();
})();
</script>
</body>
</html>
